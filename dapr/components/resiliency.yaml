apiVersion: dapr.io/v1alpha1
kind: Resiliency
metadata:
  name: order-resilience-policies
spec:
  policies:
    retries:
      order-retry-policy:
        policy: exponential
        initialInterval: 1s
        maxInterval: 5s
        maxRetries: 3

    timeouts:
      order-timeout-policy: 5s

    circuitBreakers:
      order-circuit-breaker:
        maxRequests: 5
        timeout: 10s
        trip: consecutiveFailures > 5

  targets:
    apps:
      user-service:
        retry: order-retry-policy
        timeout: order-timeout-policy
        circuitBreaker: order-circuit-breaker

      inventory-service:
        retry: order-retry-policy
        timeout: order-timeout-policy
        circuitBreaker: order-circuit-breaker

      payment-service:
        retry: order-retry-policy
        timeout: order-timeout-policy
        circuitBreaker: order-circuit-breaker